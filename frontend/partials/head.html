<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digitale Dagstaat - Zwembad</title>
    <link rel="icon" type="image/png" href="/images/debercken-site.png">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* Alleen-lezen modus: de invoervelden tonen enkel hun inhoud (zie de
           .alleen-lezen regels in style.css). Het bewerken wordt al geblokkeerd via
           readonly/disabled op de velden zelf (auth.js → _zetVeldenReadonly), dus de
           velden blijven bewust selecteerbaar om waarden te kunnen kopiëren.
           Schrijf-actieknoppen (blok/tekstblok toevoegen of verwijderen) worden hier
           wel uitgeschakeld; navigatie- en tabknoppen houden geen .schrijf-actie en
           blijven dus bruikbaar. */
        .alleen-lezen .schrijf-actie,
        .alleen-lezen .blok-verwijder-btn,
        .alleen-lezen .logboek-verwijder-btn { pointer-events: none; opacity: 0.55; }
        /* Gebruikersbeheer: vaste kolommen zodat de naam/wachtwoord-velden smaller
           zijn en de Rollen-kolom de resterende ruimte krijgt. */
        #sectie-gebruikers table { table-layout: fixed; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
