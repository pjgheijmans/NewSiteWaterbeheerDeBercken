<div id="sectie-configuratie" style="display: none;">
            <h2>Configuratie</h2>
            <p style="color:#666; font-size:14px; margin-top:-6px;">
                Algemene instellingen. Wijzigingen werken direct, zonder herstart.
            </p>
            <table>
                <thead>
                    <tr>
                        <th>Instelling</th>
                        <th>Waarde</th>
                    </tr>
                </thead>
                <tbody id="configuratieTbody"></tbody>
            </table>
            <div class="actie-container" style="justify-content: flex-start; min-height: 28px;">
                <span id="configuratieSaveStatus" style="font-size:14px; font-style:italic;"></span>
            </div>

            <div style="margin-top:24px; padding-top:16px; border-top:1px solid #eee;">
                <h3 style="font-size:15px; margin:0 0 8px;">Ontwikkeling</h3>
                <label style="display:flex; align-items:center; gap:8px; font-size:14px;">
                    <input type="checkbox" id="cfg-tracing" onchange="toggleTracing(this.checked)">
                    Functietracing — logt alle functieaanroepen (met in- en uitvoer) naar de
                    browserconsole (F12). De pagina herlaadt om de wijziging te activeren.
                </label>
            </div>
        </div>
