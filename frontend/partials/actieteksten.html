<div id="sectie-actieteksten" style="display: none;">
            <h2>Actie-teksten</h2>
            <p style="font-size:13px;color:#666;margin:-6px 0 12px;">
                Pas de formulering van de gegenereerde acties aan. Plaatshouders tussen accolades worden
                automatisch ingevuld: <code>{bad}</code> = badnaam, <code>{drempel}</code> = grenswaarde,
                <code>{waarde}</code> = gemeten waarde.
            </p>
            <div id="actieTekstenGroep"></div>
            <div class="actie-container" style="justify-content: flex-start; min-height: 28px;">
                <button class="btn-centraal-opslaan" onclick="laadStandaardActieTeksten()">Standaardteksten</button>
                <span id="actieTekstenSaveStatus" style="font-size:14px; font-style:italic; margin-left:12px;"></span>
            </div>
        </div>
