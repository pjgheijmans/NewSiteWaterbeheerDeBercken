; Zend OPcache — voorkomt dat elke request alle PHP-bestanden opnieuw compileert.
; Zonder dit las/compileerde elke request ~1300 bronbestanden vanaf de trage
; bind-mount (seconden aan bootstrap-overhead). Met opcache gebeurt dat één keer.
;
; validate_timestamps=1 + revalidate_freq=2: codewijzigingen worden nog steeds
; live opgepikt (opcache checkt hooguit elke 2s of een bestand veranderd is), dus
; de "code is gemount, edits zijn meteen actief"-dev-workflow blijft werken.
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=10000
opcache.validate_timestamps=1
opcache.revalidate_freq=2
