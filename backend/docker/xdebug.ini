; Xdebug 3 — functietracing met invoerargumenten én retourwaarden.
;
; Standaard UIT: xdebug.mode staat op "off". Xdebug 3 leest de omgevingsvariabele
; XDEBUG_MODE en overschrijft daarmee xdebug.mode, zodat tracing zonder image-rebuild
; aan/uit kan. De container-CMD zet XDEBUG_MODE=trace als TRACE=1 in de omgeving staat
; (zie backend/Dockerfile en docker-compose.yml).
;
; Traces komen per request in backend/logs/xdebug/ (op de host leesbaar via de mount).
xdebug.mode = off
xdebug.start_with_request = yes

; Invoer (argumenten) + uitvoer (retourwaarden) in de trace opnemen.
xdebug.collect_params = true
xdebug.collect_return = true

; 0 = mensvriendelijk tekstformaat; output_dir is de Xdebug 3-naam (voorheen
; trace_output_dir). %t = timestamp, %p = pid — uniek per request.
xdebug.trace_format = 0
xdebug.output_dir = /var/www/html/backend/logs/xdebug
xdebug.trace_output_name = trace.%t.%p
xdebug.use_compression = false
