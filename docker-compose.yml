services:
    db:
        image: mysql:8.0
        container_name: zwembad_db
        restart: always
        environment:
            MYSQL_DATABASE: zwembad_status
            MYSQL_ROOT_PASSWORD: geheim_wachtwoord
        ports:
            - '3306:3306'
        volumes:
            - db_data:/var/lib/mysql
            - ./init.sql:/docker-entrypoint-initdb.d/init.sql
        healthcheck:
            test:
                [
                    'CMD',
                    'mysqladmin',
                    'ping',
                    '-h',
                    'localhost',
                    '-u',
                    'root',
                    '-pgeheim_wachtwoord',
                ]
            interval: 5s
            timeout: 5s
            retries: 20
            start_period: 30s

    # PHP-backend (Apache + mod_php) — vervangt de oude Node/TS `web`-service.
    web:
        build:
            context: ./backend
            dockerfile: Dockerfile
        container_name: zwembad_web
        restart: unless-stopped
        ports:
            - '8080:80'
        environment:
            - DB_HOST=db
            - DB_USER=root
            - DB_PASSWORD=geheim_wachtwoord
            - DB_NAME=zwembad_status
        volumes:
            # Hele repo gemount: backend/ (app), frontend/ (assets) en init.sql.
            # Codewijzigingen zijn meteen actief.
            - .:/var/www/html
            # vendor/ staat NIET op de (trage) bind-mount maar op een lokaal
            # named volume (container-ext4). Het lezen van de ~1300 dependency-
            # bestanden per request ging van seconden naar milliseconden. vendor/
            # wordt bij de eerste start in dit lege volume geïnstalleerd
            # (zie backend/Dockerfile). Herinstalleren: `docker compose down -v`
            # of `docker volume rm nieuwe_site_tryout_vendor_data`.
            - vendor_data:/var/www/html/backend/vendor
        depends_on:
            db:
                condition: service_healthy

volumes:
    db_data:
    vendor_data:
