<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <title>Digitale Dagstaat - Zwembad</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f7f6;
            color: #333;
        }

        .container {
            max-width: 1050px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin-top: 0;
            color: #0056b3;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .hoofd-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: #343a40;
            padding: 10px;
            border-radius: 6px;
        }

        .hoofd-nav button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            background: #495057;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
        }

        .hoofd-nav button.actief {
            background: #28a745;
        }

        .menu-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            border-bottom: 2px solid #007BFF;
        }

        .tab-btn {
            padding: 12px 25px;
            font-size: 15px;
            font-weight: bold;
            border: none;
            background: #e9ecef;
            color: #495057;
            border-radius: 5px 5px 0 0;
            cursor: pointer;
        }

        .tab-btn.actief {
            background: #007BFF;
            color: white;
        }

        .datum-navigatie {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            background: #e9ecef;
            padding: 10px 15px;
            border-radius: 5px;
        }

        .datum-navigatie button {
            padding: 10px 20px;
            font-weight: bold;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .datum-navigatie input[type="date"] {
            padding: 8px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th,
        td {
            padding: 12px;
            border: 1px solid #dee2e6;
            text-align: left;
            vertical-align: middle;
        }

        th {
            background-color: #007BFF;
            color: white;
            font-weight: 600;
        }

        td input[type="number"],
        td select {
            width: 110px;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .actie-container {
            display: flex;
            justify-content: flex-end;
            margin-top: 15px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        .btn-centraal-opslaan {
            padding: 12px 30px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        .btn-centraal-opslaan:hover {
            background-color: #218838;
        }

        .buiten-limiet {
            background-color: #ffcccc !important;
            border-color: #dc3545 !important;
        }

        .status-melding {
            text-align: center;
            font-weight: bold;
            margin-top: 15px;
            min-height: 20px;
        }

        .succes {
            color: #28a745;
        }

        .fout {
            color: #dc3545;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Zwembad Dashboard - Digitale Dagstaat</h1>

        <div class="hoofd-nav">
            <button id="btn-rol-waterbeheer" class="actief" onclick="wisselRol('waterbeheer')">Waterbeheer</button>
            <button id="btn-rol-coordinatoren" onclick="wisselRol('coordinatoren')">Coördinatoren</button>
            <button id="btn-rol-limieten" onclick="wisselRol('limieten')">Limieten Beheer</button>
        </div>

        <!-- Dagstaten -->
        <div id="sectie-dagstaat">
            <div class="datum-navigatie">
                <button onclick="veranderDatum(-1)">◀ Vorige Dag</button>
                <input type="date" id="centraleDatum" onchange="laadMetingen()">
                <button onclick="veranderDatum(1)">Volgende Dag ▶</button>
            </div>

            <div class="menu-tabs" id="waterbeheer-tabs">
                <button class="tab-btn actief" id="tab-grote-baden" onclick="wisselBadPagina('grote-baden')">Diep /
                    Ondiep</button>
                <button class="tab-btn" id="tab-peuterbad" onclick="wisselBadPagina('peuterbad')">Peuterbad</button>
            </div>

            <table>
                <thead id="tabelKop"></thead>
                <tbody id="dagstaatTbody"></tbody>
            </table>

            <div class="actie-container">
                <button class="btn-centraal-opslaan" onclick="verwerkCentraleOpslaan()">Opslaan</button>
            </div>
        </div>

        <!-- Limieten -->
        <div id="sectie-limieten" style="display: none;">
            <h2>Centrale Richtwaarden & Limieten</h2>
            <p>Pas hier de minimum en maximum toegestane waarden aan. Deze gelden direct voor alle baden.</p>
            <table>
                <thead>
                    <tr>
                        <th>Parameter</th>
                        <th>Minimum Waarde</th>
                        <th>Maximum Waarde</th>
                    </tr>
                </thead>
                <tbody id="limietenTbody"></tbody>
            </table>

            <div class="actie-container">
                <button class="btn-centraal-opslaan" onclick="verwerkCentraleLimietenOpslaan()">Opslaan</button>
            </div>
        </div>

        <div id="statusBericht" class="status-melding"></div>
    </div>

    <script>
        // Haal de huidige datum op in de lokale tijdzone van de computer
        const vandaagLocal = new Date();
        const jyyy = vandaagLocal.getFullYear();
        const mm = String(vandaagLocal.getMonth() + 1).padStart(2, '0');
        const dd = String(vandaagLocal.getDate()).padStart(2, '0');

        // Vul het datumveld correct in met YYYY-MM-DD formaat
        document.getElementById('centraleDatum').value = `${jyyy}-${mm}-${dd}`;
        
        let huidigeRol = 'waterbeheer';
        let huidigeBadPagina = 'grote-baden';
        let gecachteData = [];
        let actieveLimieten = {};

        function toonBericht(tekst, type) {
            const element = document.getElementById('statusBericht');
            if (element) {
                element.innerText = tekst;
                element.className = 'status-melding ' + type;
            }
        }

        async function startApplicatie() {
            await laadLimietenVanServer();
            await laadMetingen();
        }

        async function laadLimietenVanServer() {
            try {
                const response = await fetch('/api/limieten');
                actieveLimieten = await response.json();
                bouwLimietenBeheerTabel();
            } catch (fout) { console.error("Kon limieten niet laden", fout); }
        }

        function wisselRol(rowName) {
            huidigeRol = rowName;
            document.getElementById('btn-rol-waterbeheer').classList.toggle('actief', rowName === 'waterbeheer');
            document.getElementById('btn-rol-coordinatoren').classList.toggle('actief', rowName === 'coordinatoren');
            document.getElementById('btn-rol-limieten').classList.toggle('actief', rowName === 'limieten');

            if (rowName === 'limieten') {
                document.getElementById('sectie-dagstaat').style.display = 'none';
                document.getElementById('sectie-limieten').style.display = 'block';
                toonBericht('', '');
            } else {
                document.getElementById('sectie-dagstaat').style.display = 'block';
                document.getElementById('sectie-limieten').style.display = 'none';
                document.getElementById('waterbeheer-tabs').style.display = (rowName === 'waterbeheer') ? 'flex' : 'none';
                laadMetingen();
            }
        }

        function wisselBadPagina(pagina) {
            huidigeBadPagina = pagina;
            document.getElementById('tab-grote-baden').classList.toggle('actief', pagina === 'grote-baden');
            document.getElementById('tab-peuterbad').classList.toggle('actief', pagina === 'peuterbad');
            bouwTabelOp(gecachteData);
        }

        async function laadMetingen() {
            const datum = document.getElementById('centraleDatum').value;
            if (!datum) return;

            toonBericht('', '');
            const endpoint = (huidigeRol === 'waterbeheer') ? '/api/metingen' : '/api/coordinatoren';

            try {
                const response = await fetch(`${endpoint}?datum=${datum}`);
                gecachteData = await response.json();
                bouwTabelOp(gecachteData);
            } catch (fout) { toonBericht('Fout bij het ophalen van de gegevens.', 'fout'); }
        }

        function valideerVeld(inputElement, parameterNaam) {
            const waarde = parseFloat(inputElement.value);
            const limiet = actieveLimieten[parameterNaam];
            if (!isNaN(waarde) && limiet) {
                if (waarde < limiet.min || waarde > limiet.max) {
                    inputElement.classList.add('buiten-limiet');
                } else {
                    inputElement.classList.remove('buiten-limiet');
                }
            } else {
                inputElement.classList.remove('buiten-limiet');
            }
        }

        function bouwTabelOp(data) {
            const tKop = document.getElementById('tabelKop');
            const tBody = document.getElementById('dagstaatTbody');
            tKop.innerHTML = ''; tBody.innerHTML = '';

            if (huidigeRol === 'waterbeheer') {
                if (huidigeBadPagina === 'grote-baden') {
                    tKop.innerHTML = `<tr><th>Bad</th><th>pH</th><th>Chloor (mg/l)</th><th>Flow (m³/h)</th><th>Filterdruk (bar)</th></tr>`;
                    ['Diep', 'Ondiep'].forEach(bad => {
                        const meting = Array.isArray(data) ? data.find(m => m.bad_naam === bad) : null;
                        tBody.innerHTML += genereerRijWaterbeheer(bad, meting || {}, false);
                    });
                } else {
                    tKop.innerHTML = `<tr><th>Bad</th><th>pH</th><th>Chloor (mg/l)</th></tr>`;
                    const meting = Array.isArray(data) ? data.find(m => m.bad_naam === 'Peuterbad') : null;
                    tBody.innerHTML += genereerRijWaterbeheer('Peuterbad', meting || {}, true);
                }
            } else if (huidigeRol === 'coordinatoren') {
                tKop.innerHTML = `<tr><th>Bad</th><th>pH</th><th>Chloor (mg/l)</th><th>Temp (°C)</th><th>Helderheid</th></tr>`;
                ['Diep', 'Ondiep', 'Peuterbad'].forEach(bad => {
                    const meting = Array.isArray(data) ? data.find(m => m.bad_naam === bad) : null;
                    tBody.innerHTML += genereerRijCoordinatoren(bad, meting || {});
                });
            }

            document.querySelectorAll('#dagstaatTbody input[type="number"]').forEach(input => {
                const param = input.getAttribute('data-param');
                if (param) valideerVeld(input, param);
            });
        }

        function genereerRijWaterbeheer(badNaam, meting, isPeuterbad) {
            const ph = meting.ph_waarde ?? ''; const chloor = meting.chloor_waarde ?? '';
            if (isPeuterbad) {
                return `<tr id="rij-${badNaam}" data-bad="${badNaam}"><td><b>${badNaam}</b></td>
                <td><input type="number" class="v-ph" step="0.01" value="${ph}" data-param="ph_waarde" oninput="valideerVeld(this, 'ph_waarde')"></td>
                <td><input type="number" class="v-chloor" step="0.01" value="${chloor}" data-param="chloor_waarde" oninput="valideerVeld(this, 'chloor_waarde')"></td></tr>`;
            } else {
                const flow = meting.flow ?? ''; const druk = meting.filter_druk ?? '';
                return `<tr id="rij-${badNaam}" data-bad="${badNaam}"><td><b>${badNaam}</b></td>
                <td><input type="number" class="v-ph" step="0.01" value="${ph}" data-param="ph_waarde" oninput="valideerVeld(this, 'ph_waarde')"></td>
                <td><input type="number" class="v-chloor" step="0.01" value="${chloor}" data-param="chloor_waarde" oninput="valideerVeld(this, 'chloor_waarde')"></td>
                <td><input type="number" class="v-flow" value="${flow}" data-param="flow" oninput="valideerVeld(this, 'flow')"></td>
                <td><input type="number" class="v-druk" step="0.01" value="${druk}" data-param="filter_druk" oninput="valideerVeld(this, 'filter_druk')"></td></tr>`;
            }
        }

        function genereerRijCoordinatoren(badNaam, meting) {
            const ph = meting.ph_waarde ?? ''; const chloor = meting.chloor_waarde ?? '';
            const temp = meting.watertemperatuur ?? ''; const helderheid = meting.helderheid ?? 'Helder';
            return `<tr id="rij-${badNaam}" data-bad="${badNaam}"><td><b>${badNaam}</b></td>
            <td><input type="number" class="c-ph" step="0.01" value="${ph}" data-param="ph_waarde" oninput="valideerVeld(this, 'ph_waarde')"></td>
            <td><input type="number" class="c-chloor" step="0.01" value="${chloor}" data-param="chloor_waarde" oninput="valideerVeld(this, 'chloor_waarde')"></td>
            <td><input type="number" class="c-temp" step="0.1" value="${temp}" data-param="watertemperatuur" oninput="valideerVeld(this, 'watertemperatuur')"></td>
            <td><select class="c-helder"><option value="Helder" ${helderheid === 'Helder' ? 'selected' : ''}>Helder</option><option value="Licht troebel" ${helderheid === 'Licht troebel' ? 'selected' : ''}>Licht troebel</option><option value="Troebel" ${helderheid === 'Troebel' ? 'selected' : ''}>Troebel</option></select></td></tr>`;
        }

        async function verwerkCentraleOpslaan() {
            toonBericht('Gegevens verwerken...', '');
            const rijen = document.querySelectorAll('#dagstaatTbody tr');
            const datum = document.getElementById('centraleDatum').value;
            let succesTeller = 0;

            for (const rij of rijen) {
                const badNaam = rij.getAttribute('data-bad');
                let payload = { datum: datum, bad_naam: badNaam };
                let url = '';

                if (huidigeRol === 'waterbeheer') {
                    url = '/api/metingen';
                    payload.ph_waarde = parseFloat(rij.querySelector('.v-ph').value) || null;
                    payload.chloor_waarde = parseFloat(rij.querySelector('.v-chloor').value) || null;

                    const flowVeld = rij.querySelector('.v-flow');
                    const drukVeld = rij.querySelector('.v-druk');
                    payload.flow = flowVeld ? (parseInt(flowVeld.value) || null) : null;
                    payload.filter_druk = drukVeld ? (parseFloat(drukVeld.value) || null) : null; // Hier stond de typfout, nu gecorrigeerd naar hoofdletter V
                } else if (huidigeRol === 'coordinatoren') {
                    url = '/api/coordinatoren';
                    payload.ph_waarde = parseFloat(rij.querySelector('.c-ph').value) || null;
                    payload.chloor_waarde = parseFloat(rij.querySelector('.c-chloor').value) || null;
                    payload.watertemperatuur = parseFloat(rij.querySelector('.c-temp').value) || null;
                    payload.helderheid = rij.querySelector('.c-helder').value;
                }

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (response.ok) succesTeller++;
                } catch (fout) { console.error(fout); }
            }

            if (succesTeller === rijen.length) {
                toonBericht('Gegevens succesvol opgeslagen!', 'succes');
                laadMetingen();
            } else {
                toonBericht('Niet alle gegevens konden worden opgeslagen.', 'fout');
            }
        }

        function bouwLimietenBeheerTabel() {
            const tbody = document.getElementById('limietenTbody');
            tbody.innerHTML = '';
            const labels = { ph_waarde: 'pH Waarde', chloor_waarde: 'Chloor (mg/l)', flow: 'Flow (m³/h)', filter_druk: 'Filterdruk (bar)', watertemperatuur: 'Watertemperatuur (°C)' };
            Object.keys(actieveLimieten).forEach(param => {
                tbody.innerHTML += `
                <tr id="limiet-rij-${param}" data-param="${param}">
                    <td><b>${labels[param] || param}</b></td>
                    <td><input type="number" class="l-min" step="0.01" value="${actieveLimieten[param].min}"></td>
                    <td><input type="number" class="l-max" step="0.01" value="${actieveLimieten[param].max}"></td>
                </tr>
            `;
            });
        }

        async function verwerkCentraleLimietenOpslaan() {
            toonBericht('Limieten verwerken...', '');
            const rijen = document.querySelectorAll('#limietenTbody tr');
            let succesTeller = 0;

            for (const rij of rijen) {
                const paramNaam = rij.getAttribute('data-param');
                const payload = {
                    parameter_naam: paramNaam,
                    min_waarde: parseFloat(rij.querySelector('.l-min').value),
                    max_waarde: parseFloat(rij.querySelector('.l-max').value)
                };

                try {
                    const response = await fetch('/api/limieten', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (response.ok) {
                        succesTeller++;
                    }
                } catch (fout) { console.error(fout); }
            }

            if (succesTeller === rijen.length) {
                toonBericht('Alle limieten succesvol bijgewerkt!', 'succes');
                await laadLimietenVanServer();
            } else {
                toonBericht('Niet alle limieten konden worden opgeslagen.', 'fout');
            }
        }

        // function veranderDatum(dagen) {
        //     const centraleInput = document.getElementById('centraleDatum');
        //     const actueleDatum = new Date(centraleInput.value);
        //     actueleDatum.setDate(actueleDatum.getDate() + dagen);
        //     centraleInput.value = actueleDatum.toISOString().split('T');
        //     laadMetingen();
        // }

            function veranderDatum(dagen) {
                    const centraleInput = document.getElementById('centraleDatum');
                    const actueleDatum = new Date(centraleInput.value);

                    // Verschuif de datum met het aantal dagen (+1 of -1)
                    actueleDatum.setDate(actueleDatum.getDate() + dagen);

                    // Zet de verschoven datum om naar lokale YYYY-MM-DD
                    const jyyy = actueleDatum.getFullYear();
                    const mm = String(actueleDatum.getMonth() + 1).padStart(2, '0');
                    const dd = String(actueleDatum.getDate()).padStart(2, '0');

                    // Schrijf de schone datum terug (zonder kloktijd of tijdzone)
                    centraleInput.value = `${jyyy}-${mm}-${dd}`;

                    // Haal direct de nieuwe metingen op uit de database
                    laadMetingen();
                }
                
        startApplicatie();
    </script>
</body>

</html>
